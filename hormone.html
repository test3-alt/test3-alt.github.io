<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혈당량 조절 항상성 시뮬레이션</title>
<style>
  /* ===== 전체 기본 스타일 (파스텔톤 디자인) ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "맑은 고딕", sans-serif;
    background: linear-gradient(135deg, #f0f7ff 0%, #fef6f9 100%);
    color: #333; padding: 20px; min-height: 100vh;
  }
  h1 { text-align: center; color: #4a6fa5; margin-bottom: 6px; font-size: 28px; }
  .subtitle { text-align: center; color: #8a9bb5; margin-bottom: 24px; font-size: 15px; }

  .container { max-width: 960px; margin: 0 auto; display: grid;
    grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { background: #fff; border-radius: 18px; padding: 20px;
    box-shadow: 0 6px 20px rgba(120,140,180,0.12); }
  .full { grid-column: 1 / -1; }
  .card h2 { font-size: 17px; color: #4a6fa5; margin-bottom: 14px; }

  /* ===== 컨트롤 버튼 ===== */
  .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  button { border: none; border-radius: 14px; padding: 14px 22px; font-size: 16px;
    font-weight: bold; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s; color: #fff; }
  button:hover:not(:disabled) { transform: translateY(-2px); }
  button:active:not(:disabled) { transform: translateY(0); }
  .btn-eat   { background: #ff9aa2; box-shadow: 0 4px 0 #f07b85; }
  .btn-exer  { background: #82c8e5; box-shadow: 0 4px 0 #5fa9c9; }
  .btn-reset { background: #b5b5c3; box-shadow: 0 4px 0 #9a9aa8; }
  button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* ===== 혈당 게이지 ===== */
  .gauge-wrap { position: relative; height: 230px; display:flex; align-items:flex-end; justify-content:center; }
  .gauge-bar-bg { position: relative; width: 100px; height: 210px; background: #eef1f6;
    border-radius: 12px; overflow: hidden; border: 2px solid #e0e5ee; }
  /* 정상 범위(녹색 가이드라인) 영역 */
  .normal-zone { position: absolute; left: 0; width: 100%;
    background: rgba(107, 191, 107, 0.22);
    border-top: 2px dashed #4caf50; border-bottom: 2px dashed #4caf50; z-index:1; }
  .normal-label { position:absolute; left:4px; font-size:10px; color:#3d9140; font-weight:bold; z-index:2; }
  .zone-line { position:absolute; left:0; width:100%; border-top:1px dashed #c3cad6; z-index:1; }
  .zone-tick { position:absolute; right:-34px; font-size:10px; color:#9aa6ba; transform:translateY(-50%); }
  .gauge-fill { position: absolute; bottom: 0; left: 0; width: 100%;
    background: linear-gradient(to top, #ff9aa2, #ffb347); z-index:2;
    border-top-left-radius:6px; border-top-right-radius:6px; }
  /* 막대 위에 떠다니는 혈액 방울 표시 */
  .blood-drop { position:absolute; left:50%; transform:translateX(-50%); top:-2px; font-size:18px; z-index:3; }
  .gauge-value { text-align:center; font-size: 26px; font-weight: bold; margin-top: 12px; color:#4a6fa5;}
  .gauge-value small { font-size:14px; color:#8a9bb5; }
  .gauge-status { text-align:center; font-size: 15px; margin-top:4px; font-weight:bold; }
  .legend { font-size:12px; color:#7a8aa0; text-align:center; margin-top:8px;}

  /* ===== 인체 모식도 (이자/간/세포) ===== */
  .body-map { position: relative; height: 240px; }
  .organ { position: absolute; border-radius: 50%; display:flex; align-items:center;
    justify-content:center; flex-direction:column; font-size: 13px; font-weight:bold; text-align:center;
    transition: box-shadow 0.3s, transform 0.3s; }
  .pancreas { left: 6%; top: 36%; width: 95px; height: 95px; background:#ffe0b2; color:#c47f17; }
  .liver    { right: 6%; top: 6%; width: 110px; height: 110px; background:#f8c6c9; color:#b5575c; }
  .cell     { right: 12%; bottom: 4%; width: 82px; height: 82px; background:#cfe8f5; color:#3b7fa0; }
  .organ.glow-insulin { box-shadow: 0 0 0 6px rgba(95,169,201,0.35); }
  .organ.glow-glucagon { box-shadow: 0 0 0 6px rgba(229,143,78,0.4); }

  /* 글리코젠 저장 표시 (간 안의 포도당 덩어리) */
  .glycogen-store { position:absolute; right: 4%; top: 122px; width:115px; text-align:center;
    font-size: 12px; color:#b5575c; }
  .glucose-dots { font-size: 18px; letter-spacing:2px; min-height: 24px; }
  .glucose-dots span { display:inline-block; transition: transform 0.3s; }
  @keyframes popIn { 0%{transform:scale(0);} 60%{transform:scale(1.4);} 100%{transform:scale(1);} }
  .pop { animation: popIn 0.4s ease; }

  /* ===== 날아가는 호르몬 캡슐 애니메이션 ===== */
  .capsule { position: absolute; width: 30px; height: 18px; border-radius: 10px; font-size: 8px;
    color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold; opacity:0; z-index: 5; }
  .insulin  { background:#5fa9c9; }
  .glucagon { background:#e58f4e; }
  @keyframes flyInsulin { 0%{left:14%;top:46%;opacity:0;} 15%{opacity:1;}
    100%{left:66%;top:24%;opacity:0;} }
  @keyframes flyGlucagon { 0%{left:66%;top:26%;opacity:0;} 15%{opacity:1;}
    100%{left:14%;top:46%;opacity:0;} }
  .anim-insulin  { animation: flyInsulin 1.3s ease-in forwards; }
  .anim-glucagon { animation: flyGlucagon 1.3s ease-in forwards; }

  /* 포도당 입자(세포로 흡수 / 간에서 방출) */
  .particle { position:absolute; font-size:14px; z-index:4; opacity:0; }
  @keyframes toCell { 0%{opacity:0;} 20%{opacity:1;} 100%{left:74%;bottom:8%;top:auto;opacity:0;} }
  @keyframes fromLiver { 0%{left:60%;top:30%;opacity:0;} 20%{opacity:1;}
    100%{left:14%;top:46%;opacity:0;} }
  .p-tocell { animation: toCell 1.2s ease-in forwards; }
  .p-fromliver { animation: fromLiver 1.2s ease-out forwards; }

  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
  .active-pulse { animation: pulse 0.8s ease infinite; }

  /* ===== 실시간 설명창 ===== */
  .message-board { background: #fffbe6; border-left: 6px solid #ffd54f; border-radius: 10px;
    padding: 16px; font-size: 15px; line-height:1.6; min-height: 70px; color:#6b5b1a; transition: background 0.3s; }
  .hormone-tag { display:inline-block; padding:2px 8px; border-radius:8px; color:#fff; font-size:13px; font-weight:bold;}
</style>
</head>
<body>
  <h1>🩸 혈당량 조절 항상성 시뮬레이션</h1>
  <p class="subtitle">버튼을 눌러 우리 몸이 어떻게 혈당을 일정하게 유지하는지 직접 확인해 보세요!</p>

  <div class="container">
    <!-- ===== 좌측: 혈당 게이지 대시보드 ===== -->
    <div class="card">
      <h2>📊 현재 혈당량</h2>
      <div class="gauge-wrap">
        <div class="gauge-bar-bg">
          <div class="normal-zone" id="normalZone"><span class="normal-label">정상</span></div>
          <div class="gauge-fill" id="gaugeFill"><span class="blood-drop">🩸</span></div>
        </div>
      </div>
      <div class="gauge-value"><span id="bloodSugar">90</span> <small>mg/dL</small></div>
      <div class="gauge-status" id="statusText">정상 ✅</div>
      <div class="legend">초록 점선 구간(70~110)이 '정상 범위'예요</div>
    </div>

    <!-- ===== 우측: 인체 모식도 + 애니메이션 ===== -->
    <div class="card">
      <h2>🫀 우리 몸 속 이야기</h2>
      <div class="body-map" id="bodyMap">
        <div class="organ pancreas" id="pancreas">이자<br>(췌장)</div>
        <div class="organ liver" id="liver">간<br>(Liver)</div>
        <div class="organ cell" id="cell">세포</div>
        <div class="glycogen-store">
          글리코젠 저장량<br>
          <span class="glucose-dots" id="glycogenDots"></span>
        </div>
      </div>
    </div>

    <!-- ===== 컨트롤 버튼 ===== -->
    <div class="card full">
      <div class="controls">
        <button class="btn-eat"   id="eatBtn">🍚 식사하기 (혈당 ↑)</button>
        <button class="btn-exer"  id="exerBtn">🏃 운동하기/공복 (혈당 ↓)</button>
        <button class="btn-reset" id="resetBtn">🔄 초기화</button>
      </div>
    </div>

    <!-- ===== 실시간 설명창 ===== -->
    <div class="card full">
      <h2>💬 실시간 해설</h2>
      <div class="message-board" id="messageBoard">
        버튼을 눌러 시뮬레이션을 시작해 보세요! 지금 우리 몸의 혈당은 정상 범위에 있어요. 😊
      </div>
    </div>
  </div>

<script>
/* =========================================================
   혈당량 조절 항상성 시뮬레이션 - 핵심 로직 (개선판)
   1) requestAnimationFrame 기반 '서서히 변하는' 혈당
   2) 연타 방지(버튼 잠금) + 절대 최소/최대 한곗값(clamp)
   3) 이모지/SVG/CSS 입자 애니메이션 강화
   4) 게이지에 정상 범위 + 눈금 가이드 시각화
   ========================================================= */
const NORMAL_MIN = 70;    // 정상 범위 하한
const NORMAL_MAX = 110;   // 정상 범위 상한
const GAUGE_MAX  = 200;   // 게이지 시각화 최댓값
const ABS_MIN    = 30;    // 혈당 절대 최솟값(0 이하로 떨어지지 않게)
const ABS_MAX    = 190;   // 혈당 절대 최댓값(무한대로 치솟지 않게)
const SPECIAL    = 90;    // 평상시 정상 기준값

let bloodSugar = 90;      // 현재 혈당(서서히 변하는 실제 표시값)
let target     = 90;      // 혈당이 향해 가는 목표값
let glycogen   = 2;       // 간 글리코젠 양(0~5단계)
let busy       = false;   // 시뮬레이션 진행 중 여부(연타 방지 플래그)
let rafId      = null;    // requestAnimationFrame ID
let phase      = "idle";  // 현재 작용 단계(insulin/glucagon/idle)
let sceneTimers = [];     // 단계 전환용 setTimeout 모음(정리를 위해 보관)

const $ = (id) => document.getElementById(id);

/* ===== 1) 정상 범위 녹색 영역 + 눈금 가이드 그리기 ===== */
function drawGuides() {
  const zone = $("normalZone");
  zone.style.bottom = (NORMAL_MIN / GAUGE_MAX * 100) + "%";
  zone.style.height = ((NORMAL_MAX - NORMAL_MIN) / GAUGE_MAX * 100) + "%";
  // 눈금선(50,100,150) 추가
  const bg = document.querySelector(".gauge-bar-bg");
  [50, 100, 150].forEach(v => {
    const line = document.createElement("div");
    line.className = "zone-line";
    line.style.bottom = (v / GAUGE_MAX * 100) + "%";
    const tick = document.createElement("span");
    tick.className = "zone-tick"; tick.style.bottom = (v / GAUGE_MAX * 100) + "%";
    tick.textContent = v;
    line.appendChild(tick); bg.appendChild(line);
  });
}

/* ===== 한곗값 안에 가두는 clamp 함수(예외 방어) ===== */
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

/* ===== 화면 갱신(게이지 높이/색/숫자/글리코젠) ===== */
function render() {
  const pct = clamp(bloodSugar / GAUGE_MAX * 100, 0, 100);
  $("gaugeFill").style.height = pct + "%";
  $("bloodSugar").textContent = Math.round(bloodSugar);

  const fill = $("gaugeFill"), status = $("statusText");
  if (bloodSugar > NORMAL_MAX) {
    fill.style.background = "linear-gradient(to top,#ff9aa2,#ff6b6b)";
    status.textContent = "혈당 높음 ⬆️"; status.style.color = "#e05555";
  } else if (bloodSugar < NORMAL_MIN) {
    fill.style.background = "linear-gradient(to top,#82c8e5,#5fa9c9)";
    status.textContent = "혈당 낮음 ⬇️"; status.style.color = "#3b7fa0";
  } else {
    fill.style.background = "linear-gradient(to top,#a8e6a3,#6bbf6b)";
    status.textContent = "정상 ✅"; status.style.color = "#4caf50";
  }
}

/* ===== 글리코젠 사탕 개수 갱신(변할 때 pop 애니메이션) ===== */
function renderGlycogen() {
  const box = $("glycogenDots");
  if (glycogen <= 0) { box.textContent = "(비어있음)"; return; }
  box.innerHTML = "";
  for (let i = 0; i < glycogen; i++) {
    const s = document.createElement("span");
    s.className = "pop"; s.textContent = "🍬";
    box.appendChild(s);
  }
}
function changeGlycogen(delta) {
  glycogen = clamp(glycogen + delta, 0, 5);
  renderGlycogen();
}

/* ===== 메시지 출력 ===== */
function setMessage(html) { $("messageBoard").innerHTML = html; }

/* ===== 버튼 잠금/해제 (연타 방지) ===== */
function lockButtons(lock) {
  busy = lock;
  $("eatBtn").disabled = lock;
  $("exerBtn").disabled = lock;
  // 초기화는 항상 가능(중간에 멈추고 리셋할 수 있도록)
}

/* ===== 2) requestAnimationFrame: 혈당을 목표값으로 '서서히' 이동 ===== */
function animateLoop() {
  // 목표와의 차이를 매 프레임 일부만 줄여 부드럽게 수렴(이징)
  const diff = target - bloodSugar;
  bloodSugar += diff * 0.06;        // 0.06 = 부드러움 정도
  bloodSugar = clamp(bloodSugar, ABS_MIN, ABS_MAX);

  // 이동 방향에 따라 글리코젠을 천천히 반영
  if (phase === "insulin" && Math.abs(diff) > 2 && Math.random() < 0.04) changeGlycogen(+1);
  if (phase === "glucagon" && Math.abs(diff) > 2 && Math.random() < 0.05) changeGlycogen(-1);

  render();
  if (Math.abs(diff) > 0.4) {
    rafId = requestAnimationFrame(animateLoop);
  } else {
    bloodSugar = target; render(); rafId = null;
  }
}
function moveTo(value) {              // 목표값 설정 후 애니메이션 시작
  target = clamp(value, ABS_MIN, ABS_MAX);
  if (!rafId) rafId = requestAnimationFrame(animateLoop);
}

/* ===== 호르몬 캡슐 / 포도당 입자 날리기 애니메이션 ===== */
function flyHormone(type) {
  const cap = document.createElement("div");
  cap.className = "capsule " + type + " anim-" + type;
  cap.textContent = (type === "insulin") ? "인슐린" : "글루카곤";
  $("bodyMap").appendChild(cap);
  cap.addEventListener("animationend", () => cap.remove());
}
function flyParticle(dir) {           // dir: 'tocell'(흡수) / 'fromliver'(방출)
  const p = document.createElement("div");
  p.className = "particle p-" + dir;
  p.textContent = "🟡";
  if (dir === "tocell") { p.style.left = "30%"; p.style.top = "45%"; }
  $("bodyMap").appendChild(p);
  p.addEventListener("animationend", () => p.remove());
}

/* ===== 진행 중인 타이머/애니메이션 모두 정리 ===== */
function clearScene() {
  sceneTimers.forEach(t => clearTimeout(t));
  sceneTimers = [];
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}
function later(fn, ms) { const t = setTimeout(fn, ms); sceneTimers.push(t); return t; }

/* =========================================================
   상태 A: [식사하기] - 혈당 상승 → 인슐린 분비 → 서서히 회복
   ========================================================= */
function eat() {
  if (busy) return;                 // 연타 방지: 진행 중이면 무시
  clearScene(); lockButtons(true);
  phase = "spike";

  // (1) 혈당이 서서히 급상승 (절대 최댓값 안에서)
  moveTo(clamp(bloodSugar + 70, ABS_MIN, ABS_MAX));
  setMessage(`🍚 식사를 하니 혈당이 <b>서서히 올라가고 있어요!</b><br>
    이자(췌장)가 깜짝 놀라 <span class="hormone-tag" style="background:#5fa9c9">인슐린</span>('포도당 창고지기')을 준비합니다.`);
  $("pancreas").classList.add("glow-insulin");

  // (2) 잠시 후 인슐린 작용 시작: 혈당을 정상으로 서서히 하강
  later(() => {
    phase = "insulin";
    setMessage(`<span class="hormone-tag" style="background:#5fa9c9">인슐린</span>이 간으로 날아갑니다! 🚀<br>
      혈액 속 🟡포도당을 ① 세포로 밀어넣고 ② 남은 건 간에 <b>'글리코젠(🍬)'</b>으로 저장해요.`);
    $("cell").classList.add("active-pulse");
    $("liver").classList.add("glow-insulin");
    moveTo(95);                     // 정상값으로 서서히 회복

    // 작용 중 캡슐/입자 애니메이션 반복
    const fx = setInterval(() => { flyHormone("insulin"); flyParticle("tocell"); }, 600);
    sceneTimers.push(fx);

    // (3) 회복 완료 안내
    later(() => {
      clearInterval(fx);
      $("cell").classList.remove("active-pulse");
      $("pancreas").classList.remove("glow-insulin");
      $("liver").classList.remove("glow-insulin");
      phase = "idle"; lockButtons(false);
      setMessage(`✅ <b>성공!</b> 인슐린 덕분에 혈당이 <b>서서히 정상</b>으로 돌아왔어요.<br>
        남은 포도당은 간에 글리코젠으로 저장됐답니다. 우리 몸은 정말 똑똑하죠? 😄`);
    }, 5200);
  }, 2200);
}

/* =========================================================
   상태 B: [운동/공복] - 혈당 하강 → 글루카곤 분비 → 서서히 회복
   ========================================================= */
function exercise() {
  if (busy) return;                 // 연타 방지
  clearScene(); lockButtons(true);
  phase = "spike";

  // (1) 혈당이 서서히 급하강 (절대 최솟값 안에서)
  moveTo(clamp(bloodSugar - 50, ABS_MIN, ABS_MAX));
  setMessage(`🏃 운동을 하거나 오래 굶으니 혈당이 <b>서서히 떨어지고 있어요!</b><br>
    이자(췌장)가 <span class="hormone-tag" style="background:#e58f4e">글루카곤</span>('비상 포도당 호출원')을 준비합니다.`);
  $("pancreas").classList.add("glow-glucagon");

  // (2) 글루카곤 작용: 글리코젠 분해 → 혈당 서서히 상승
  later(() => {
    phase = "glucagon";
    setMessage(`<span class="hormone-tag" style="background:#e58f4e">글루카곤</span>이 간으로 출동! 🚒<br>
      간에 저장된 <b>'글리코젠(🍬)'</b>을 다시 🟡<b>포도당</b>으로 분해해 혈액으로 내보내요.`);
    $("liver").classList.add("glow-glucagon");
    moveTo(88);                     // 정상값으로 서서히 회복

    const fx = setInterval(() => { flyHormone("glucagon"); flyParticle("fromliver"); }, 600);
    sceneTimers.push(fx);

    later(() => {
      clearInterval(fx);
      $("pancreas").classList.remove("glow-glucagon");
      $("liver").classList.remove("glow-glucagon");
      phase = "idle"; lockButtons(false);
      setMessage(`✅ <b>성공!</b> 글루카곤이 글리코젠을 분해해 혈당을 <b>서서히 정상</b>으로 끌어올렸어요.<br>
        위급할 때 저장해 둔 에너지를 꺼내 쓰는 거예요. 🔋`);
    }, 5200);
  }, 2200);
}

/* ===== 초기화 (언제든 가능) ===== */
function reset() {
  clearScene();
  phase = "idle"; lockButtons(false);
  glycogen = 2; renderGlycogen();
  ["glow-insulin","glow-glucagon"].forEach(c => {
    $("pancreas").classList.remove(c); $("liver").classList.remove(c);
  });
  $("cell").classList.remove("active-pulse");
  // 90으로 서서히 복귀
  bloodSugar = bloodSugar; moveTo(90);
  setMessage("🔄 초기 상태로 돌아왔어요. 혈당이 정상(90 mg/dL)으로 부드럽게 돌아갑니다. 다시 실험해 볼까요? 😊");
}

/* ===== 이벤트 연결 및 초기 실행 ===== */
$("eatBtn").addEventListener("click", eat);
$("exerBtn").addEventListener("click", exercise);
$("resetBtn").addEventListener("click", reset);
drawGuides();
renderGlycogen();
render();
</script>
</body>
</html>
